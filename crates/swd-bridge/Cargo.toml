# The host-side SWD mailbox bridge (specs/swd-mailbox.md, "Host"). A host library + CLI that reads and
# writes the master's RAM mailbox rings over SWD MEM-AP **while the core runs, no halt** (the proven
# LINK_OBS / openocd `read_memory`/`write_memory` path), and presents the bridge end as a host
# `SerialTransport` - the mirror of the firmware `MailboxSerial`. Host-only (it talks to openocd over
# TCP), EXCLUDED from the workspace so the thumbv7m build never sees it.
[package]
name = "swd-bridge"
version = "0.1.0"
edition = "2021"
description = "Host SWD RAM-mailbox bridge: read/write the master's mailbox rings over MEM-AP (openocd TCL RPC) while the core runs, presenting the bridge end as a host SerialTransport. The host counterpart of the firmware MailboxSerial."

[dependencies]
# The mailbox layout/ABI (constants + offsets) and the L2 framing the rings carry. Both build on the
# host target (swd-mailbox is no_std but host-compatible; its cortex-m DMB dep is arm-gated).
swd-mailbox = { path = "../swd-mailbox" }
link = { path = "../link" }
# The link-control payload codec: the canonical owner of the INPUTS/DRIVE_CMD/etc wire bytes and the
# control-block opcode constants (the swd-mailbox-inputs tool encodes its INPUTS payload through it,
# never hand-rolls the bytes).
linkctl = { path = "../linkctl" }
embedded-io = "0.6"
# The host controller drives the L3 walk + CONFIG_* over the mailbox (net::Controller, the PDU codec,
# the wire consts), and confirms the persisted node_address by mounting the store over a flash image
# read back over SWD (store::Store + base::FlashError).
net = { path = "../net" }
store = { path = "../store" }
base = { path = "../base" }

[[bin]]
name = "swd-mailbox-bridge"
path = "src/main.rs"

[[bin]]
name = "swd-mailbox-walk"
path = "src/bin/walk.rs"

[[bin]]
name = "l3-tier2"
path = "src/bin/l3_tier2.rs"

# General config-field writer: stage any registered field (board-layout presets included) over the
# SWD mailbox, type-checked against the store registry (silicon-queue section 6 staging tool).
[[bin]]
name = "swd-mailbox-config"
path = "src/bin/config_write.rs"

# INPUTS sender: deliver an INPUTS L7 payload (throttle/buttons/rider) to an addressed board over the
# SWD mailbox, so a bench session can assert power_request (buttons bit0) and drive the mode machine's
# arming path (OFF->INIT->READY->RUN) to exercise the firmware's armed CONFIG_WRITE gate.
[[bin]]
name = "swd-mailbox-inputs"
path = "src/bin/inputs.rs"

[dev-dependencies]
# The board-layout boot validator, so the end-to-end test can stage a layout via the config path
# and then run the SAME validator the firmware runs at boot (proving the tool can stage both a
# valid and an invalid layout for the firmware to judge). Dev-only; the tool itself never links it.
board = { path = "../board" }
