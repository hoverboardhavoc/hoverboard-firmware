name: CI

# Layer 1 (storage) CI. From Layer 0 the `base` crate was HAL-independent, but Layer 1 adds the
# `store` / `store-test` crates whose on-target `FmcFlash` adapter depends on the sibling runtime-hal
# (a target-gated path dep `../../../runtime-hal`). Cargo loads a path dependency's manifest during
# workspace resolution REGARDLESS of the build target, so EVERY job that runs cargo over the workspace
# (build, host-tests, emulator-tests) must check runtime-hal out as a sibling of the repo, even the
# host-target test job where the HAL is not actually linked. So each job checks the two repos out into
# sibling subdirectories and runs from the firmware one. runtime-hal is a public repo; we pin its
# default branch (main).
#
# Five checks:
#   - lint: rustfmt over everything CI builds, then clippy over BOTH build surfaces (thumbv7m and
#     host --all-targets; without --all-targets clippy lints only the lib and skips every test),
#   - build the default embedded target (thumbv7m-none-eabi),
#   - run the host tests on the runner's Linux host target,
#   - run the workspace-excluded swd-bridge's tests (the HostMailbox <-> Mailbox agreement suite),
#   - run the Tier-2 Unicorn emulator tests (the dummy + store images), plus clippy over the
#     emulator-runner (it lives in that job because its unicorn build needs cmake).
#
# The rust-toolchain.toml in the repo pins the channel (stable) and auto-installs the
# thumbv7m-none-eabi target; we still pass `targets` to dtolnay/rust-toolchain so the host
# target the tests need is present too.

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always
  # Fixed host target so host tests do not inherit the .cargo/config.toml default
  # (thumbv7m-none-eabi). GitHub Linux runners are x86_64.
  HOST_TARGET: x86_64-unknown-linux-gnu

jobs:
  # Format + lint gates, first so an unformatted commit fails fast (rustfmt is a pure-source check,
  # no build). Clippy runs over BOTH surfaces CI builds:
  #   - the thumbv7m surface (what `cargo build` ships). It cannot use --all-targets: test harnesses
  #     need std/libtest, which the bare-metal target lacks;
  #   - the host-test surface with --all-targets, which is where the #[cfg(test)] modules and
  #     integration tests get linted (clippy without --all-targets lints only the lib and silently
  #     skips all test code), with the same -F store/test-fields the host-test job compiles with.
  # The workspace-excluded crates are covered too: swd-bridge is fmt-checked and
  # clippy'd here via its manifest; emulator-runner is fmt-checked here but clippy'd in the
  # emulator-tests job (its unicorn native build needs cmake, installed there); hardware-runner
  # is fmt-checked here and ONLY fmt-checked (it drives real probes over probe-rs, so nothing in
  # CI compiles or runs it; rustfmt is a pure-source check, no build needed).
  lint:
    name: rustfmt + clippy (thumbv7m + host --all-targets)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hoverboard-firmware
    steps:
      - name: Checkout firmware
        uses: actions/checkout@v4
        with:
          path: hoverboard-firmware

      - name: Checkout runtime-hal (sibling, main)
        uses: actions/checkout@v4
        with:
          repository: hoverboardhavoc/runtime-hal
          ref: main
          path: runtime-hal

      - name: Install Rust (stable) + targets + rustfmt/clippy
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: thumbv7m-none-eabi, x86_64-unknown-linux-gnu
          components: rustfmt, clippy

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: hoverboard-firmware

      - name: rustfmt (workspace)
        run: cargo fmt --all --check

      - name: rustfmt (workspace-excluded crates)
        run: |
          cargo fmt --check --manifest-path crates/swd-bridge/Cargo.toml
          cargo fmt --check --manifest-path crates/emulator-runner/Cargo.toml
          cargo fmt --check --manifest-path crates/hardware-runner/Cargo.toml

      - name: clippy (thumbv7m build surface)
        run: cargo clippy --target thumbv7m-none-eabi -- -D warnings

      - name: clippy (host-test surface, all targets)
        run: >
          cargo clippy
          --workspace --all-targets
          --target ${{ env.HOST_TARGET }}
          -F store/test-fields
          -- -D warnings

      - name: clippy (swd-bridge, all targets)
        run: >
          cargo clippy
          --manifest-path crates/swd-bridge/Cargo.toml
          --all-targets
          --target ${{ env.HOST_TARGET }}
          -- -D warnings

  # Embedded build for the real target. A bare `cargo build` uses the thumbv7m-none-eabi default from
  # .cargo/config.toml and builds the workspace images (dummy-test, store-test), so it needs the
  # sibling runtime-hal checked out (store/store-test's target-gated FmcFlash dep).
  #
  # NOTE: the `.text + .data` size gate is DEFERRED until a size budget is set per specs/roadmap.md.
  build:
    name: Build (thumbv7m-none-eabi)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hoverboard-firmware
    steps:
      - name: Checkout firmware
        uses: actions/checkout@v4
        with:
          path: hoverboard-firmware

      - name: Checkout runtime-hal (sibling, main)
        uses: actions/checkout@v4
        with:
          repository: hoverboardhavoc/runtime-hal
          ref: main
          path: runtime-hal

      - name: Install Rust (stable) + thumbv7m target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: thumbv7m-none-eabi

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: hoverboard-firmware

      - name: Build (default thumbv7m target)
        run: cargo build

      # The universal shipping image: the release `firmware` ELF (specs/firmware.md, "The binary:
      # downloadable and installable"). One linked image, valid on every part.
      - name: Build release firmware image
        run: cargo build --release -p firmware

      # objcopy -O binary gives the flashable .bin. arm-none-eabi-objcopy comes from binutils;
      # the ELF keeps DWARF (profile.release debug = true) for SWD/nm, the .bin is what reaches flash.
      - name: objcopy to .bin
        run: |
          sudo apt-get update && sudo apt-get install -y binutils-arm-none-eabi
          arm-none-eabi-objcopy -O binary \
            target/thumbv7m-none-eabi/release/firmware \
            target/thumbv7m-none-eabi/release/firmware.bin

      # LTO-gutted-image guard (round-7a): a capacity/assert mismatch can make LTO delete the whole
      # main loop while the image still links (.text 55 KB -> 16.8 KB). Fail the build if the release
      # .text has collapsed below a floor (a healthy image is ~50 KB). arm-none-eabi-size comes from
      # the binutils installed in the objcopy step above. Mirrors tools/flash.sh's flash-time guard.
      - name: Assert release .text floor + required symbols (LTO-gutted-image guard)
        run: |
          elf=target/thumbv7m-none-eabi/release/firmware
          text=$(arm-none-eabi-size -A "$elf" | awk '$1==".text"{print $2}')
          echo "release .text = ${text} B"
          if [ -z "$text" ] || [ "$text" -lt 40000 ]; then
            echo "FAIL: release .text (${text}) below the 40000 B floor (LTO-gutted image?)" >&2
            exit 1
          fi
          # Required-symbol half (mirrors tools/flash.sh's integrated PROFILE_REQ_SYMS): the control
          # stack PLUS the six detect fault-path fns. These are #[inline(never)] + host-untestable, so a
          # codegen/LTO change that dropped or inlined-away the bus-fault-safe probe would strip the
          # fleet's only runtime chip-identity path while still linking + passing the .text floor. Fail
          # the build if any is absent.
          syms=$(arm-none-eabi-nm "$elf")
          miss=""
          for s in 'T main$' 'T SysTick$' 'usart1_rx_isr' 'dma_rx_isr' 'B CTRL_OBS$' \
                   '5probe3run17h' '5probe12probe_family' '5probe15probe_candidate' \
                   '5probe13probe_present' '5probe14measure_counts' '5probe15scratch_present'; do
            printf '%s\n' "$syms" | grep -qE "$s" || miss="${miss} ${s}"
          done
          if [ -n "$miss" ]; then
            echo "FAIL: required symbol(s) absent from the release image (LTO-gutted?):${miss}" >&2
            exit 1
          fi
          echo "required symbols present (control stack + six detect probe fns)"

      # Every CI build uploads the .bin and .elf as a workflow artifact, so any commit's image can be
      # downloaded from its Actions run without a local toolchain. One .bin, any part.
      - name: Upload firmware artifacts (.bin + .elf)
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: |
            hoverboard-firmware/target/thumbv7m-none-eabi/release/firmware.bin
            hoverboard-firmware/target/thumbv7m-none-eabi/release/firmware

      # A tagged release additionally attaches them as GitHub Release assets, the stable download.
      - name: Attach to GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            hoverboard-firmware/target/thumbv7m-none-eabi/release/firmware.bin
            hoverboard-firmware/target/thumbv7m-none-eabi/release/firmware

  # Host tests. Run with an explicit host target so they neither inherit the thumbv7m default nor the
  # link.x flag scoped to it in .cargo/config.toml. Even though the HAL is not linked on the host
  # target, cargo still loads its manifest during resolution, so runtime-hal must be present.
  host-tests:
    name: Host tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hoverboard-firmware
    steps:
      - name: Checkout firmware
        uses: actions/checkout@v4
        with:
          path: hoverboard-firmware

      - name: Checkout runtime-hal (sibling, main)
        uses: actions/checkout@v4
        with:
          repository: hoverboardhavoc/runtime-hal
          ref: main
          path: runtime-hal

      - name: Install Rust (stable) + host target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: hoverboard-firmware

      # `-F store/test-fields` turns on the store crate's reserved test fields + `run`/`run_var`
      # scenario dispatch (off in a production build), so the store's host tests that exercise them
      # (persist/negative-control) still run. The flag scopes to the `store` member; the rest of the
      # workspace is unaffected.
      - name: Run host tests
        run: cargo test --target ${{ env.HOST_TARGET }} -F store/test-fields

  # crates/swd-bridge is workspace-excluded (a host-only tool: it talks to openocd over TCP), so the
  # workspace host-test job never compiles it. Its unit suite is the ONLY agreement check between the
  # host `HostMailbox` and the firmware `Mailbox` (ring layout, ABI constants, framing), so it runs
  # here via its own manifest on the host target. The tests are pure host unit tests (no openocd, no
  # probe); like every job, the sibling runtime-hal checkout is needed for path-dep resolution.
  swd-bridge-tests:
    name: swd-bridge tests (HostMailbox <-> Mailbox agreement)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hoverboard-firmware
    steps:
      - name: Checkout firmware
        uses: actions/checkout@v4
        with:
          path: hoverboard-firmware

      - name: Checkout runtime-hal (sibling, main)
        uses: actions/checkout@v4
        with:
          repository: hoverboardhavoc/runtime-hal
          ref: main
          path: runtime-hal

      - name: Install Rust (stable) + host target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: hoverboard-firmware

      - name: Run swd-bridge tests
        run: >
          cargo test
          --manifest-path crates/swd-bridge/Cargo.toml
          --target ${{ env.HOST_TARGET }}

  # Tier-2 gate: the real thumbv7m images running under the Unicorn emulator (the same images the bench
  # flashes). emulator-runner is excluded from the workspace (it links Unicorn's cmake-built native lib,
  # which cannot cross-compile to thumbv7m), so it is built/tested via its own manifest on the host
  # target, behind the `unicorn` feature. The tests build the dummy-test AND store-test images first.
  emulator-tests:
    name: Emulator tests (Unicorn, tier 2)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hoverboard-firmware
    steps:
      - name: Checkout firmware
        uses: actions/checkout@v4
        with:
          path: hoverboard-firmware

      - name: Checkout runtime-hal (sibling, main)
        uses: actions/checkout@v4
        with:
          repository: hoverboardhavoc/runtime-hal
          ref: main
          path: runtime-hal

      - name: Install Rust (stable) + host and thumbv7m targets + clippy
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu, thumbv7m-none-eabi
          components: clippy

      - name: Install build tools for Unicorn (cmake + pkg-config)
        run: sudo apt-get update && sudo apt-get install -y cmake pkg-config build-essential

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: hoverboard-firmware

      - name: Run emulator tests under Unicorn
        run: >
          cargo test
          --manifest-path crates/emulator-runner/Cargo.toml
          --features unicorn
          --target ${{ env.HOST_TARGET }}

      # emulator-runner's clippy lives here, not in the lint job: linting it means compiling its
      # unicorn dep (the cmake-built native lib), and this job already installs cmake + carries the
      # build in its cache. Same --all-targets + -D warnings bar as the lint job.
      - name: clippy (emulator-runner, unicorn, all targets)
        run: >
          cargo clippy
          --manifest-path crates/emulator-runner/Cargo.toml
          --features unicorn
          --all-targets
          --target ${{ env.HOST_TARGET }}
          -- -D warnings
