name: CI

# Layer 0 (Foundations) CI + the test harness tier-2 (Unicorn) gate. The workspace members
# (base, harness-abi, harness-smoke) are HAL-independent and do not depend on runtime-hal, so
# this workflow does NOT check out a sibling runtime-hal (that gets added in a later layer when
# a crate first depends on the HAL).
#
# Jobs:
#   - build the default embedded target (thumbv7m-none-eabi): base + harness-abi + the
#     harness-smoke subject. unicorn-engine / probe-rs are NOT in this graph (the two host-only
#     crates are workspace-excluded; see the root Cargo.toml).
#   - run the host tests on the runner's Linux host target (harness-abi's kernel/address tests).
#   - tier-2 (the harness emulator gate): build the harness-smoke thumbv7m image and run it under
#     Unicorn (the harness-emu crate), checking the self-checked verdict comes back PASS for both
#     command words. This is the EXACT shipping machine code reaching its verdict the same
#     RAM-channel way the silicon does. The bench/silicon tier (bench-runner) is NOT run in CI.
#
# The rust-toolchain.toml in the repo pins the channel (stable) and auto-installs the
# thumbv7m-none-eabi target; we still pass `targets` to dtolnay/rust-toolchain so the host
# target the tests/emulator need is present too.

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always
  # Fixed host target so host tests do not inherit the .cargo/config.toml default
  # (thumbv7m-none-eabi). GitHub Linux runners are x86_64.
  HOST_TARGET: x86_64-unknown-linux-gnu

jobs:
  # Embedded build for the real target. A bare `cargo build` uses the thumbv7m-none-eabi
  # default from .cargo/config.toml. base is a pure library (no cortex-m-rt binary yet), so
  # nothing links link.x at this layer.
  #
  # NOTE: the `.text + .data` size gate is DEFERRED. There is no firmware binary yet, only the
  # base library, so there is nothing to size-gate. The gate gets added when the first binary
  # (a cortex-m-rt image) exists, per specs/roadmap.md.
  build:
    name: Build (thumbv7m-none-eabi)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable) + thumbv7m target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: thumbv7m-none-eabi

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2

      - name: Build (default thumbv7m target)
        run: cargo build

  # Host tests. Run with an explicit host target so they neither inherit the thumbv7m default
  # nor the link.x flag scoped to it in .cargo/config.toml.
  host-tests:
    name: Host tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable) + host target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2

      - name: Run host tests
        run: cargo test --target ${{ env.HOST_TARGET }}

  # Tier 2: the test-harness emulator gate. Builds the harness-smoke thumbv7m image and runs it
  # under Unicorn (harness-emu), checking the subject's self-checked verdict comes back PASS for
  # both command words. harness-emu is workspace-EXCLUDED (it links a native lib that cannot
  # cross-compile to thumbv7m), so it is built/run via its own manifest with the `emu` feature on a
  # host target. The harness-emu test itself shells out `cargo build -p harness-smoke --target
  # thumbv7m-none-eabi` to produce the image it loads, so the thumbv7m target must be installed too.
  #
  # unicorn-engine builds Unicorn from source via cmake, so cmake + a C/C++ toolchain are needed.
  # unicorn-engine is GPL-2.0 and links a native lib: fine for this host-only CI tooling, NEVER
  # linked into firmware.
  emu-harness:
    name: Harness tier-2 (Unicorn)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable) + host and thumbv7m targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu, thumbv7m-none-eabi

      - name: Install Unicorn build tools (cmake + toolchain)
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential pkg-config

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2

      - name: Run the Unicorn proof (harness-emu, emu feature)
        run: >-
          cargo test
          --manifest-path crates/harness-emu/Cargo.toml
          --target ${{ env.HOST_TARGET }}
          --features emu
